apiVersion: apps/v1
kind: Deployment
metadata:
  name: gopher-demo-nginx
  labels:
    app: gopher-ops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gopher-ops
  template:
    metadata:
      labels:
        app: gopher-ops
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: gopher-demo-service
spec:
  selector:
    app: gopher-ops
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: NodePort
